<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - NewLander</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        .events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
        .event-card { padding: 24px; display: flex; flex-direction: column; gap: 16px; position:relative; overflow:hidden;}
        .event-card::before { content:''; position:absolute; top:0; left:0; width:4px; height:100%; background:linear-gradient(to bottom, var(--primary), var(--secondary)); }
        .e-date { color: var(--primary); font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; background:rgba(79, 70, 229, 0.1); display:inline-block; padding:6px 12px; border-radius:100px;}
        .e-title { font-weight: 800; font-size: 1.25rem; color: var(--text-main); line-height: 1.3;}
        .e-loc { color: var(--text-muted); font-size: 0.9rem; display:flex; align-items:center; gap:8px;}
        .e-desc { color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; flex-grow:1; background:rgba(255,255,255,0.5); padding:12px; border-radius:8px;}
        .btn-register { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; width:100%; box-shadow:0 4px 6px rgba(79, 70, 229, 0.2);}
        .btn-register:hover { transform:translateY(-2px); box-shadow:0 8px 12px rgba(79, 70, 229, 0.3); }
        .btn-registered { background: var(--success); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 600; width:100%; cursor:default; box-shadow:0 4px 6px rgba(16, 185, 129, 0.2);}
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo"><i class="fas fa-globe-americas"></i><span>NewLander</span></div>
            <button class="mobile-close" id="closeSidebar"><i class="fas fa-times"></i></button>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item"><i class="fas fa-compass"></i> <span>Home</span></a>
            <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i> <span>Dashboard</span></a>
            <a href="profile.html" class="nav-item"><i class="fas fa-user"></i> <span>Profile</span></a>
            <a href="bookings.html" class="nav-item"><i class="fas fa-key"></i> <span>Bookings</span></a>
            <a href="events.html" class="nav-item active"><i class="fas fa-calendar-alt"></i> <span>Events</span></a>
            <a href="community.html" class="nav-item"><i class="fas fa-users"></i> <span>Community</span></a>
        </nav>
        <div class="sidebar-footer">
            <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></button>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <button class="mobile-menu-btn" id="openSidebar"><i class="fas fa-bars"></i></button>
            <div class="search-bar"></div>
            <div class="header-right">
                <div class="user-profile">
                    <div class="avatar" id="headerInitials">U</div>
                    <span class="user-name" id="headerName">Loading</span>
                </div>
            </div>
        </header>

        <div class="dashboard-container">
            <div class="welcome-section">
                <h1>Upcoming Events</h1>
                <p>Discover and join meetups, webinars, and social events.</p>
            </div>
            
            <div id="eventsList" class="events-grid">
                <div class="skeleton-block" style="height: 280px;"></div>
                <div class="skeleton-block" style="height: 280px;"></div>
                <div class="skeleton-block" style="height: 280px;"></div>
            </div>
        </div>
    </main>

    <script src="auth.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            if (!Auth.isLoggedIn()) { window.location.href = "login.html"; return; }

            const sidebar = document.getElementById('sidebar');
            document.getElementById('openSidebar')?.addEventListener('click', () => sidebar.classList.add('active'));
            document.getElementById('closeSidebar')?.addEventListener('click', () => sidebar.classList.remove('active'));
            document.getElementById('logoutBtn')?.addEventListener('click', () => Auth.logout());

            const user = Auth.getCurrentUser();
            if(user) {
                const firstName = (user.full_name || "User").split(' ')[0];
                document.getElementById('headerName').textContent = firstName;
                document.getElementById('headerInitials').textContent = firstName.charAt(0).toUpperCase();
            }

            async function loadEvents() {
                try {
                    const res = await Auth.authenticatedRequest(`${API_BASE_URL}/events.php`);
                    const container = document.getElementById('eventsList');
                    
                    if (res && res.success && res.data && res.data.length > 0) {
                        container.innerHTML = res.data.map(e => `
                            <div class="glass-card event-card">
                                <div>
                                    <div style="margin-bottom:12px"><span class="e-date"><i class="far fa-calendar-alt"></i> ${e.event_date} at ${e.event_time}</span></div>
                                    <div class="e-title">${e.title}</div>
                                    <div class="e-loc" style="margin-top:8px"><i class="fas fa-map-marker-alt" style="color:var(--primary-light)"></i> ${e.city}, ${e.country}</div>
                                </div>
                                <div class="e-desc">${e.description ? e.description.substring(0, 120) + '...' : 'Join us for this exciting event! Click register to secure your spot.'}</div>
                                <button class="btn-register" onclick="registerEvent(${e.id}, this)">
                                    <i class="fas fa-ticket-alt"></i> Register Now
                                </button>
                            </div>
                        `).join("");
                    } else {
                        container.innerHTML = `
                        <div class="empty-state" style="grid-column: 1 / -1; padding:60px;">
                            <i class="fas fa-calendar" style="font-size:4rem; color:#cbd5e1; margin-bottom:20px;"></i>
                            <h3 style="color:var(--text-main); margin-bottom:8px;">No Events Available</h3>
                            <p>There are no upcoming events at the moment. Check back later!</p>
                        </div>`;
                    }
                } catch(e) {
                    console.error(e);
                    document.getElementById('eventsList').innerHTML = `<div class="error-banner">Failed to load events.</div>`;
                }
            }

            window.registerEvent = async function(eventId, btn) {
                const originalText = btn.innerHTML;
                btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Processing...`;
                btn.disabled = true;
                btn.style.transform = "none";
                try {
                    const res = await Auth.authenticatedRequest(`${API_BASE_URL}/event_registration.php`, {
                        method: 'POST',
                        body: JSON.stringify({ event_id: eventId })
                    });
                    if(res && res.success) {
                        btn.innerHTML = `<i class="fas fa-check-circle"></i> Registered!`;
                        btn.className = "btn-registered";
                    } else {
                        alert(res.message || "Failed to register");
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                    }
                } catch(e) {
                    alert("Network error.");
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            };

            loadEvents();
        });
    </script>
</body>
</html>
